---

- name: Disable swap
  command: swapoff -a


- name: Remove swap entry
  replace:
    path: /etc/fstab
    regexp: '^([^#].*swap.*)$'
    replace: '#\1'


- name: Load kernel modules
  modprobe:
    name: "{{ item }}"
  loop:
    - overlay
    - br_netfilter


- name: Configure kubernetes sysctl
  copy:
    dest: /etc/sysctl.d/kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1


- name: Apply sysctl
  command:
    sysctl --system


- name: Install packages
  apt:
    name:
      - containerd
      - apt-transport-https
      - curl
    update_cache: yes


- name: Start containerd
  service:
    name: containerd
    state: started
    enabled: yes
